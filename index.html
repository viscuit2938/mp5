<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>.mp5 -- Audio Experience</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap');
  @import url('https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400&display=swap');
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #FFFFFF; --text: #000000; --meta: #999999;
    --dim: #CCCCCC; --rule-light: #E8E8E8; --accent: #0066FF;
    --player-height: 96px;
    --nav-width: 110px;
    --font: "Inter","Helvetica Neue","Hiragino Sans",sans-serif;
  }
  body { background:#fff; color:#000; font-family:var(--font); height:100dvh; overflow:hidden; display:flex; flex-direction:column; -webkit-font-smoothing:antialiased; }

  /* SCREEN SYSTEM */
  .screen { position:fixed; inset:0; background:#fff; display:none; flex-direction:column; align-items:center; justify-content:center; padding:20px; z-index:100; overflow-y:auto; }
  #screen-0 { display:flex; z-index:110; }
  #screen-1 { perspective:1200px; }
  #screen-2 { justify-content:flex-start; padding-top:60px; }
  .frame-fixed { width:100%; max-width:480px; position:relative; }
  .wordmark { font-size:clamp(56px,15vw,88px); font-weight:300; letter-spacing:-0.04em; line-height:0.9; margin-bottom:12px; transition:transform 0.08s ease-out; will-change:transform; display:inline-block; }
  .tagline { font-size:10px; letter-spacing:0.2em; color:var(--meta); text-transform:uppercase; margin-bottom:48px; }
  .start-btn { background:#000; color:#fff; padding:18px; font-size:11px; letter-spacing:0.3em; text-transform:uppercase; cursor:pointer; width:100%; border:none; outline:none; font-family:var(--font); }

  /* STEP 02 CARD */
  .preset-card { border-top:1px solid #000; padding:24px 0; cursor:pointer; -webkit-tap-highlight-color:transparent; width:100%; }
  .preset-card:last-child { border-bottom:1px solid var(--rule-light); }
  .preset-card-inner { display:flex; align-items:center; gap:20px; }
  .play-circle { width:48px; height:48px; border-radius:50%; border:1px solid #000; display:flex; align-items:center; justify-content:center; flex-shrink:0; }
  .play-triangle { width:0; height:0; border-style:solid; border-width:8px 0 8px 14px; border-color:transparent transparent transparent #000; margin-left:4px; }
  .preset-info { display:flex; flex-direction:column; gap:4px; }
  .preset-filename { font-size:14px; font-weight:600; letter-spacing:0.02em; }
  .preset-details { font-size:11px; color:var(--meta); }
  .preset-thumb-sq { width:48px; height:48px; object-fit:cover; flex-shrink:0; border:1px solid #000; display:block; }

  /* PAGE LABEL */
  .page-label { position:fixed; top:16px; left:20px; right:20px; display:flex; justify-content:space-between; font-size:10px; font-weight:600; letter-spacing:0.12em; text-transform:uppercase; color:#000; z-index:500; pointer-events:none; mix-blend-mode:difference; }
  .page-label span { color:#fff; }

  /* PROCESSING */
  #processing-screen { position:fixed; inset:0; background:#fff; display:none; flex-direction:column; align-items:center; justify-content:center; gap:24px; z-index:200; }
  .proc-label { font-size:10px; letter-spacing:0.3em; text-transform:uppercase; color:var(--text); }
  .loader-bar { width:160px; height:1px; background:#eee; position:relative; overflow:hidden; }
  .loader-inner { position:absolute; width:50%; height:100%; background:#000; animation:slide 1.5s ease-in-out infinite; }
  @keyframes slide { from{left:-100%} to{left:100%} }

  /* ===== GALLERY MAIN VIEW ===== */
  #gallery-main { position:fixed; inset:0; display:none; flex-direction:column; background:#fff; z-index:150; overflow:hidden; }

  /* Transcript strip — fixed top bar */
  #transcript-strip {
    position:fixed; top:0; left:0; right:0;
    background:#fff; border-bottom:1px solid var(--rule-light);
    z-index:260; padding:38px 20px 10px; min-height:78px;
    display:flex; flex-direction:column; justify-content:flex-end;
  }
  .strip-entry { display:none; }
  .strip-entry.active { display:block; }
  .strip-speaker { font-size:9px; font-weight:600; letter-spacing:0.14em; text-transform:uppercase; color:var(--accent); margin-bottom:3px; font-family:var(--font); }
  .strip-text { font-size:13px; line-height:1.6; color:var(--text); font-family:var(--font); }
  .strip-time { font-size:9px; color:var(--meta); font-family:'IBM Plex Mono',monospace; margin-top:2px; }

  /* Section nav */
  #section-nav-bar {
    position:fixed; top:78px; left:0; right:0;
    display:flex; overflow-x:auto; scrollbar-width:none;
    z-index:255; padding:5px 16px;
    background:#fff; border-bottom:1px solid var(--rule-light);
  }
  #section-nav-bar::-webkit-scrollbar { display:none; }
  .snav-btn { flex-shrink:0; font-size:9px; font-weight:600; letter-spacing:0.1em; text-transform:uppercase; color:var(--dim); font-family:var(--font); background:none; border:none; cursor:pointer; padding:6px 12px 6px 0; white-space:nowrap; transition:color 0.3s; }
  .snav-btn.active { color:var(--text); }

  /* Scrollable area */
  #gallery-scroll { position:absolute; top:110px; left:0; right:0; bottom:0; overflow-y:auto; overflow-x:hidden; -webkit-overflow-scrolling:touch; }
  #gallery-scroll.no-sections { top:78px; }

  /* Meta block */
  #gallery-meta-block { padding:24px 20px 32px; border-bottom:1px solid var(--rule-light); display:none; }
  #gallery-meta-block.visible { display:block; }
  .gallery-meta-title { font-size:24px; font-weight:300; color:var(--text); margin-bottom:12px; }
  .gallery-meta-sub { font-size:11px; letter-spacing:0.05em; margin-bottom:32px; font-family:'IBM Plex Mono',monospace; color:var(--meta); }
  .gallery-meta-desc { font-size:14px; line-height:1.9; margin-bottom:32px; color:var(--text); }
  .gallery-meta-credits { font-size:11px; line-height:1.8; letter-spacing:0.02em; color:var(--meta); padding-top:16px; border-top:1px solid var(--rule-light); }

  /* Images */
  #gallery-imgs-wrap { display:flex; flex-direction:column; gap:0; padding-bottom:calc(var(--player-height) + 60px); }
  #gallery-imgs-wrap img { width:100%; height:auto; display:block; cursor:pointer; }

  /* BACK BUTTON — original style & position */
  #gallery-back { position:fixed; bottom:calc(var(--player-height) + 16px); left:16px; background:#fff; border:1px solid #000; font-size:10px; padding:8px 16px; font-weight:600; cursor:pointer; z-index:270; letter-spacing:0.1em; font-family:var(--font); color:#000; }

  /* PLAYER BAR */
  #player-bar { position:fixed; bottom:0; left:0; right:0; height:var(--player-height); background:#fff; border-top:1px solid var(--rule-light); display:none; align-items:center; padding:0 20px; padding-bottom:env(safe-area-inset-bottom); z-index:300; }
  .player-inner { display:flex; align-items:center; gap:16px; width:100%; }
  .play-btn { width:44px; height:44px; border-radius:50%; border:1px solid #000; background:transparent; cursor:pointer; display:flex; align-items:center; justify-content:center; flex-shrink:0; }
  .timecode { font-size:10px; letter-spacing:0.02em; min-width:72px; font-family:var(--font); white-space:nowrap; color:var(--text); }
  .mini-area { flex:1; border-left:1px solid var(--rule-light); padding-left:16px; overflow:hidden; height:56px; display:flex; flex-direction:column; gap:2px; justify-content:flex-start; padding-top:4px; }
  .mini-speaker { font-size:9px; font-weight:600; color:var(--accent); text-transform:uppercase; letter-spacing:0.1em; flex-shrink:0; }
  .mini-text { font-size:12px; color:var(--text); line-height:1.3; display:-webkit-box; -webkit-line-clamp:2; -webkit-box-orient:vertical; overflow:hidden; height:2.6em; }

  /* LIGHTBOX */
  #lightbox { position:fixed; inset:0; background:#000; display:none; align-items:center; justify-content:center; z-index:9999; padding:16px; }
  #lightbox img { max-width:100%; max-height:88vh; object-fit:contain; display:block; transform-origin:center center; transition:transform 0.1s ease-out; }
</style>
</head>
<body>

<!-- PAGE LABEL -->
<div class="page-label" id="page-label">
  <span id="page-label-left">Voices / Experience</span>
  <span id="page-label-right">V93</span>
</div>

<!-- SCREEN 0 -->
<div id="screen-0" class="screen">
  <div class="frame-fixed" style="text-align:center;">
    <button class="start-btn" id="entry-permission-btn">EXPERIENCE?</button>
  </div>
</div>

<!-- SCREEN 1 -->
<div id="screen-1" class="screen">
  <div class="frame-fixed">
    <div class="wordmark" id="gyro-logo">.mp5</div>
    <div class="tagline">Audio &amp; Transcription</div>
    <button class="start-btn" onclick="goTo(2)">Start Experience</button>
  </div>
</div>

<!-- SCREEN 2 -->
<div id="screen-2" class="screen">
  <div class="frame-fixed">
    <div class="preset-card" onclick="startExperience('noda')">
      <div class="preset-card-inner">
        <div class="play-circle"><div class="play-triangle"></div></div>
        <div class="preset-info">
          <div class="preset-filename">nodayuta.mp3</div>
          <div class="preset-details">野田結太 -- 10:55</div>
        </div>
      </div>
    </div>
    <div class="preset-card" onclick="startExperience('kikuchi')">
      <div class="preset-card-inner">
        <div class="play-circle"><div class="play-triangle"></div></div>
        <div class="preset-info">
          <div class="preset-filename">kikuchiyuki_jgoe.mp3</div>
          <div class="preset-details">菊地佑樹 -- 53:49</div>
        </div>
      </div>
    </div>
    <div class="preset-card" onclick="startExperience('kurosaki')">
      <div class="preset-card-inner">
        <img src="./kurosaki/kurosaki_film-02.webp" class="preset-thumb-sq" alt="icon" />
        <div class="preset-info">
          <div class="preset-filename">kurosaki.mp5</div>
          <div class="preset-details">野田結太 / 葉山 黒崎海岸 -- 10:55</div>
        </div>
      </div>
    </div>
  </div>
</div>

<!-- PROCESSING -->
<div id="processing-screen">
  <div class="proc-label">Building Audio Map</div>
  <div class="loader-bar"><div class="loader-inner"></div></div>
</div>

<!-- GALLERY MAIN -->
<div id="gallery-main">
  <div id="transcript-strip"><div id="strip-entries"></div></div>
  <div id="section-nav-bar"></div>
  <div id="gallery-scroll">
    <div id="gallery-meta-block">
      <div class="gallery-meta-title"   id="gm-title"></div>
      <div class="gallery-meta-sub"     id="gm-sub"></div>
      <div class="gallery-meta-desc"    id="gm-desc"></div>
      <div class="gallery-meta-credits" id="gm-credits"></div>
    </div>
    <div id="gallery-imgs-wrap"></div>
  </div>
  <button id="gallery-back" onclick="goTo(2)">← BACK</button>
</div>

<!-- PLAYER BAR -->
<div id="player-bar">
  <div class="player-inner">
    <button class="play-btn" onclick="togglePlay()">
      <svg id="icon-play"  width="18" height="18" viewBox="0 0 24 24" fill="#000"><path d="M8 5v14l11-7z"/></svg>
      <svg id="icon-pause" width="18" height="18" viewBox="0 0 24 24" fill="#000" style="display:none"><path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z"/></svg>
    </button>
    <div class="timecode" id="timecode">00:00 / 00:00</div>
    <div class="mini-area">
      <div class="mini-speaker" id="mini-speaker"></div>
      <div class="mini-text"    id="mini-text"></div>
    </div>
  </div>
</div>

<!-- LIGHTBOX -->
<div id="lightbox" onclick="closeLightbox()">
  <img id="lightbox-img" src="" />
</div>

<script src="./noda_data.js"></script>
<script src="./kikuchi_data.js"></script>

<script>
/* DATA */
const NODA_IMAGES   = ['./nodayuta.jpg','./nodayuta_2.jpg','./nodayuta_3.jpg','./nodayuta_4.jpg'];
const NODA_META     = { title:'野田結太.mp3', sub:'nodayuta.mp3 / 10:55', desc:'', credits:'sound: @yutand___<br>Production: @___.mp5' };

const KUROSAKI_IMAGES = [
  './kurosaki/kurosaki_film-01.webp','./kurosaki/kurosaki_film-02.webp','./kurosaki/kurosaki_film-03.webp',
  './kurosaki/kurosaki_film-04.webp','./kurosaki/kurosaki_film-05.webp','./kurosaki/kurosaki_film-06.webp',
  './kurosaki/kurosaki_film-07.webp'
];
const KUROSAKI_META = {
  title: '野田結太.mp5', sub: 'loc. 葉山 黒崎海岸 / 2026.12.16',
  desc: '今回の葉山市、黒崎海岸での.mp5では、レコーダーを持ち音の収集を行った。<br>日没ごろ、野田の制作音源を海に正対し演奏。<br>録音音源は撮影後、「Kurosaki ambient」 として発展。',
  credits: 'sound: @yutand___<br>Photography: @la_viscuit<br>Production: @___.mp5'
};

const KIKUCHI_IMAGES = ['./yukikikuchi.jpg','./yukikikuchi_2.jpg'];
const KIKUCHI_META   = { title:'菊地佑樹.mp3', sub:'kikuchiyuki_jgoe.mp3 / 53:49', desc:'', credits:'sound: @memo.riesreview<br>Production: @___.mp5' };

/* STATE */
const audio = new Audio();
let playing = false, transcript = [], sections = [], currentFile = null, lastActiveIdx = -1;

/* NAV */
function goTo(n) {
  ['screen-0','screen-1','screen-2','processing-screen','gallery-main'].forEach(id => {
    const el = document.getElementById(id); if (el) el.style.display = 'none';
  });
  if (n===0)          document.getElementById('screen-0').style.display='flex';
  else if (n===1)     document.getElementById('screen-1').style.display='flex';
  else if (n===2)     document.getElementById('screen-2').style.display='flex';
  else if (n==='proc')    document.getElementById('processing-screen').style.display='flex';
  else if (n==='gallery') document.getElementById('gallery-main').style.display='flex';

  document.getElementById('player-bar').style.display = (audio.src && audio.src!=='') ? 'flex' : 'none';

  const left=document.getElementById('page-label-left'), right=document.getElementById('page-label-right');
  const map = { 0:['Voices / Experience','V93'], 1:['Voices / Experience','V93'], 2:['Select File','Step 02'], proc:['Building Audio Map',''], gallery:[currentFile==='kurosaki'?'野田結太.mp5':'.MP5','Gallery'] };
  const l = map[n]||['Voices / Experience','V93'];
  if(left) left.innerText=l[0]; if(right) right.innerText=l[1];
}

/* ENTRY */
document.getElementById('entry-permission-btn').addEventListener('click', async () => {
  if (typeof DeviceOrientationEvent!=='undefined' && typeof DeviceOrientationEvent.requestPermission==='function') {
    try { const s=await DeviceOrientationEvent.requestPermission(); if(s==='granted') window.addEventListener('deviceorientation',handleGyro,true); } catch(e){}
  } else { window.addEventListener('deviceorientation',handleGyro,true); }
  goTo(1);
});

/* GYRO */
function handleGyro(e) {
  const xAdj=e.gamma||0, yAdj=(e.beta||0)-34;
  const logo=document.getElementById('gyro-logo'), s1=document.getElementById('screen-1');
  if (s1&&s1.style.display!=='none'&&logo) {
    const mx=Math.max(-60,Math.min(60,xAdj/1.1)), my=Math.max(-60,Math.min(60,yAdj/1.1));
    logo.style.transform=`translate3d(${mx}px,${my}px,0) rotateX(${-my*3.5}deg) rotateY(${mx*3.5}deg)`;
  }
  const lb=document.getElementById('lightbox'), lbImg=document.getElementById('lightbox-img');
  if (lb&&lb.style.display==='flex'&&lbImg) {
    const px=Math.max(-25,Math.min(25,xAdj*0.7)), py=Math.max(-20,Math.min(20,yAdj*-0.5));
    lbImg.style.transform=`translate(${px}px,${py}px) scale(${1+Math.max(0,Math.min(1,((e.beta||45)-20)/50))*0.5})`;
  }
}

/* BUILD */
function buildGallery(images) {
  document.getElementById('gallery-imgs-wrap').innerHTML = images.map(src=>`<img src="${src}" onclick="openLightbox('${src}')" loading="lazy" />`).join('');
  document.getElementById('gallery-scroll').scrollTop=0;
}

function setMeta(meta) {
  const block=document.getElementById('gallery-meta-block');
  if (!meta||(!meta.title&&!meta.desc)) { block.classList.remove('visible'); return; }
  document.getElementById('gm-title').innerText   = meta.title||'';
  document.getElementById('gm-sub').innerText     = meta.sub||'';
  document.getElementById('gm-desc').innerHTML    = meta.desc||'';
  document.getElementById('gm-credits').innerHTML = meta.credits||'';
  block.classList.add('visible');
}

function buildStripEntries() {
  const c=document.getElementById('strip-entries');
  c.innerHTML = transcript.map((t,i)=>
    `<div class="strip-entry" id="se-${i}">
      <div class="strip-speaker">${t.speaker}</div>
      <div class="strip-text">${t.text}</div>
      <div class="strip-time">${t.startText||''}</div>
    </div>`
  ).join('');
}

function buildSectionNav() {
  const nav=document.getElementById('section-nav-bar'), scroll=document.getElementById('gallery-scroll');
  if (!sections.length) { nav.innerHTML=''; nav.style.display='none'; scroll.classList.add('no-sections'); return; }
  nav.style.display='flex'; scroll.classList.remove('no-sections');
  nav.innerHTML = sections.map((s,i)=>
    `<button class="snav-btn" id="snav-${i}" onclick="jumpTo(${s.start})">
      <span style="opacity:0.4;font-size:8px;display:block;margin-bottom:1px;">0${i+1}</span>${s.title}
    </button>`
  ).join('');
}

/* START */
function startExperience(file) {
  currentFile=file; audio.pause(); audio.src=''; lastActiveIdx=-1;

  if (file==='kurosaki') {
    transcript=[]; sections=[];
    buildGallery(KUROSAKI_IMAGES); setMeta(KUROSAKI_META); buildStripEntries(); buildSectionNav();
    goTo('proc');
    setTimeout(()=>{
      goTo('gallery'); audio.src='./kurosaki.mp3'; audio.loop=false; audio.load();
      audio.play().then(()=>{ playing=true; updateIcons(); document.getElementById('player-bar').style.display='flex'; }).catch(()=>{});
    },3000);
  } else if (file==='noda') {
    transcript=(typeof NODA_TRANSCRIPT!=='undefined')?NODA_TRANSCRIPT.slice():[];
    sections=(typeof NODA_SECTIONS!=='undefined')?NODA_SECTIONS.slice():[];
    buildGallery(NODA_IMAGES); setMeta(NODA_META); buildStripEntries(); buildSectionNav();
    audio.src='./nodayuta.mp3'; loadAndStart();
  } else if (file==='kikuchi') {
    transcript=(typeof KIKUCHI_TRANSCRIPT!=='undefined')?KIKUCHI_TRANSCRIPT.slice():[];
    sections=(typeof KIKUCHI_SECTIONS!=='undefined')?KIKUCHI_SECTIONS.slice():[];
    buildGallery(KIKUCHI_IMAGES); setMeta(KIKUCHI_META); buildStripEntries(); buildSectionNav();
    audio.src='./kikuchiyuki_compressed.mp3'; loadAndStart();
  }
}

function loadAndStart() {
  audio.load(); goTo('proc');
  setTimeout(()=>{ goTo('gallery'); audio.play().then(()=>{ playing=true; updateIcons(); }).catch(()=>{}); },3000);
}

/* PLAYBACK */
function jumpTo(sec) { audio.currentTime=sec; audio.play().then(()=>{ playing=true; updateIcons(); }); }
function togglePlay() { if(playing) audio.pause(); else audio.play().then(()=>playing=true); }
function updateIcons() {
  document.getElementById('icon-play').style.display  = playing?'none':'block';
  document.getElementById('icon-pause').style.display = playing?'block':'none';
}
audio.onplay  = ()=>{ playing=true;  updateIcons(); };
audio.onpause = ()=>{ playing=false; updateIcons(); };

/* TIME UPDATE */
audio.ontimeupdate = () => {
  const cur=audio.currentTime, dur=audio.duration||0;
  const fmt=s=>`${String(Math.floor(s/60)).padStart(2,'0')}:${String(Math.floor(s%60)).padStart(2,'0')}`;
  document.getElementById('timecode').innerText=`${fmt(cur)} / ${fmt(dur)}`;
  let activeIdx=-1;
  transcript.forEach((t,i)=>{
    if (cur>=t.start&&cur<=(t.end||t.start+30)) {
      activeIdx=i;
      document.getElementById('mini-speaker').innerText=t.speaker;
      document.getElementById('mini-text').innerText=t.text;
    }
  });
  if (activeIdx!==lastActiveIdx) {
    document.querySelectorAll('.strip-entry').forEach((el,i)=>el.classList.toggle('active',i===activeIdx));
    lastActiveIdx=activeIdx;
  }
  sections.forEach((s,i)=>{ const el=document.getElementById(`snav-${i}`); if(el) el.classList.toggle('active',cur>=s.start&&(sections[i+1]?cur<sections[i+1].start:true)); });
};

/* LIGHTBOX */
function openLightbox(src) { document.getElementById('lightbox-img').src=src; document.getElementById('lightbox').style.display='flex'; }
function closeLightbox() { document.getElementById('lightbox').style.display='none'; document.getElementById('lightbox-img').style.transform='none'; }

goTo(0);
</script>
</body>
</html>
