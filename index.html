<!DOCTYPE html>

<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>.mp5 -- Audio Experience</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap');
  @import url('https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400&display=swap');
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #FFFFFF; --text: #000000; --meta: #999999;
    --dim: #CCCCCC; --rule-light: #E8E8E8; --accent: #0066FF;
    --player-height: 96px; 
    --nav-width: 110px;
    --font: "Inter","Helvetica Neue","Hiragino Sans",sans-serif;
  }
  body { background:#fff; color:#000; font-family:var(--font); height:100dvh; overflow:hidden; display:flex; flex-direction:column; -webkit-font-smoothing:antialiased; }

/* SCREEN SYSTEM */
.screen { position:fixed; inset:0; background:#fff; display:none; flex-direction:column; align-items:center; justify-content:center; padding:20px; z-index:100; overflow-y:auto; }
#screen-0 { display: flex; z-index: 110; }
#screen-1 { perspective: 1200px; }
#screen-2 { justify-content:flex-start; padding-top:60px; }
.frame-fixed { width:100%; max-width:480px; position: relative; }
.top-rule { border-top:1.5px solid #000; padding-top:10px; display:flex; justify-content:space-between; font-size:10px; font-weight:600; text-transform:uppercase; letter-spacing:0.12em; margin-bottom:48px; }
.wordmark { font-size:clamp(56px,15vw,88px); font-weight:300; letter-spacing:-0.04em; line-height:0.9; margin-bottom:12px; transition: transform 0.08s ease-out; will-change: transform; display: inline-block; }
.tagline { font-size:10px; letter-spacing:0.2em; color:var(–meta); text-transform:uppercase; margin-bottom:48px; }
.start-btn { background:#000; color:#fff; padding:18px; font-size:11px; letter-spacing:0.3em; text-transform:uppercase; cursor:pointer; width:100%; border:none; outline:none; font-family:var(–font); }

/* STEP 02 CARD */
.preset-card { border-top:1px solid #000; padding:24px 0; cursor:pointer; -webkit-tap-highlight-color:transparent; width: 100%; }
.preset-card:last-child { border-bottom: 1px solid var(–rule-light); }
.preset-card-inner { display:flex; align-items:center; gap:20px; }
.play-circle { width:48px; height:48px; border-radius:50%; border:1px solid #000; display:flex; align-items:center; justify-content:center; flex-shrink:0; }
.play-triangle { width: 0; height: 0; border-style: solid; border-width: 8px 0 8px 14px; border-color: transparent transparent transparent #000; margin-left: 4px; }
.preset-info { display: flex; flex-direction: column; gap: 4px; }
.preset-filename { font-size:14px; font-weight:600; letter-spacing: 0.02em; }
.preset-details { font-size:11px; color:var(–meta); }
.preset-thumb-sq { width:48px; height:48px; object-fit:cover; flex-shrink:0; border:1px solid #000; display:block; }

/* PROCESSING SCREEN */
#processing-screen { position:fixed; inset:0; background:#fff; display:none; flex-direction:column; align-items:center; justify-content:center; gap:24px; z-index:200; }
.proc-label { font-size:10px; letter-spacing:0.3em; text-transform:uppercase; color: var(–text); }
.loader-bar { width:160px; height:1px; background:#eee; position:relative; overflow:hidden; }
.loader-inner {  width:50%; height:100%; background:#000; animation:slide 1.5s ease-in-out infinite; }
@keyframes slide { from{left:-100%} to{left:100%} }

/* SIDE NAV (110px) */
#side-nav { width:var(–nav-width); min-width:var(–nav-width); max-width:var(–nav-width); flex-shrink:0; border-right:1px solid var(–rule-light); padding:24px 12px 12px; display:flex; flex-direction:column; background:#fff; z-index:50; height:100%; overflow:hidden; }
.nav-logo { font-size:14px; font-weight:500; letter-spacing:0.1em; cursor:pointer; flex-shrink:0; margin-bottom:20px; }
.nav-sections-list { flex:1; display:flex; flex-direction:column; gap:16px; overflow-y:auto; scrollbar-width: none; }
.nav-sections-list::-webkit-scrollbar { display: none; }
.section-item { font-size:11px; line-height:1.4; color:var(–text); cursor:pointer; border:none; background:none; text-align:left; font-family:var(–font); padding:0; }
.section-item.active { color:var(–accent); font-weight:500; }
.section-num { display:block; font-size:9px; margin-bottom:3px; opacity:0.4; }
.nav-link-btn { display:flex; width:44px; min-width:44px; max-width:44px; height:44px; min-height:44px; max-height:44px; flex-shrink:0; background:#000; color:#fff; text-decoration:none; align-items:center; justify-content:center; margin-bottom:12px; overflow:hidden; }
.nav-thumb { flex-shrink:0; border-top:1px solid var(–rule-light); padding-top:10px; margin-top:8px; cursor:pointer; }
.nav-thumb img { width:100%; aspect-ratio:1; object-fit:cover; display:block; }

/* CONTENT AREA & PROJECT META */
#main { display:none; width:100%; height:100dvh; flex-direction:row; overflow:hidden; padding-bottom:var(–player-height); }
#content { flex:1; min-width:0; overflow-y:auto; overflow-x:hidden; padding:35vh 24px 15vh; -webkit-overflow-scrolling:touch; scroll-behavior:auto; }
.transcript-container { max-width:540px; margin:0 auto; }
.project-meta-block { max-width:540px; margin: 0 auto 80px; color:var(–meta); }
.project-meta-title { font-size:24px; font-weight:300; color:var(–text); margin-bottom:12px; }
.project-meta-sub { font-size:11px; letter-spacing:0.05em; margin-bottom:32px; font-family: ‘IBM Plex Mono’; }
.project-meta-desc { font-size:14px; line-height:1.9; margin-bottom:32px; color:var(–text); }
.project-meta-credits { font-size:11px; line-height:1.8; letter-spacing:0.02em; color:var(–meta); padding-top:16px; border-top:1px solid var(–rule-light); }

.transcript-entry { margin-bottom:48px; font-size:17px; line-height:1.9; color:var(–meta); transition:color 0.5s ease; }
.transcript-entry.active { color:var(–text); }
.entry-meta { display:flex; align-items:center; gap:10px; margin-bottom:6px; }
.speaker-name { font-size:10px; font-weight:600; letter-spacing:0.1em; text-transform:uppercase; color:var(–dim); }
.transcript-entry.active .speaker-name { color:var(–accent); }
.time-stamp { font-size:9px; color:var(–dim); font-family: ‘IBM Plex Mono’; }

/* PLAYER BAR */
#player-bar { position:fixed; bottom:0; left:0; right:0; height:var(–player-height); background:#fff; border-top:1px solid var(–rule-light); display:none; align-items:center; padding:0 20px; padding-bottom:env(safe-area-inset-bottom); z-index:300; }
.player-inner { display:flex; align-items:center; gap:16px; width:100%; }
.play-btn { width:44px; height:44px; border-radius:50%; border:1px solid #000; background:transparent; cursor:pointer; display:flex; align-items:center; justify-content:center; flex-shrink:0; }
.timecode { font-size:10px; letter-spacing:0.02em; min-width:72px; font-family:var(–font); white-space:nowrap; }
.mini-area { flex:1; border-left:1px solid var(–rule-light); padding-left:16px; overflow:hidden; height:56px; display:flex; flex-direction:column; gap:2px; justify-content: flex-start; padding-top: 4px; }
.mini-speaker { font-size:9px; font-weight:600; color:var(–accent); text-transform:uppercase; letter-spacing:0.1em; flex-shrink:0; }
.mini-text { font-size:12px; color:var(–text); line-height:1.3; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; height: 2.6em; }

#gallery-screen { position:fixed; inset:0; background:#fff; display:none; flex-direction:column; z-index:150; overflow-y:auto; }
#lightbox { position:fixed; inset:0; background:#000; display:none; align-items:center; justify-content:center; z-index:9999; padding:16px; }
#lightbox img { max-width:100%; max-height:88vh; object-fit:contain; display:block; transform-origin:center center; transition:transform 0.1s ease-out; }
</style>

</head>
<body>

<div id="screen-0" class="screen">
  <div class="frame-fixed" style="text-align:center;">
    <button class="start-btn" id="entry-permission-btn">EXPERIENCE?</button>
  </div>
</div>

<div id="screen-1" class="screen">
  <div class="frame-fixed">
    <div class="top-rule"><span>Voices / Experience</span><span>V84</span></div>
    <div class="wordmark" id="gyro-logo">.mp5</div>
    <div class="tagline">Audio &amp; Transcription</div>
    <button class="start-btn" onclick="goTo(2)">Start Experience</button>
  </div>
</div>

<div id="screen-2" class="screen">
  <div class="frame-fixed">
    <div class="top-rule"><span>Select File</span><span>Step 02</span></div>
    <div class="preset-card" onclick="startExperience('noda')">
      <div class="preset-card-inner">
        <div class="play-circle"><div class="play-triangle"></div></div>
        <div class="preset-info">
          <div class="preset-filename">nodayuta.mp3</div>
          <div class="preset-details">野田結太 -- 10:55</div>
        </div>
      </div>
    </div>
    <div class="preset-card" onclick="startExperience('kikuchi')">
      <div class="preset-card-inner">
        <div class="play-circle"><div class="play-triangle"></div></div>
        <div class="preset-info">
          <div class="preset-filename">kikuchiyuki_jgoe.mp3</div>
          <div class="preset-details">菊地佑樹 -- 53:49</div>
        </div>
      </div>
    </div>
    <div class="preset-card" onclick="startExperience('kurosaki')">
      <div class="preset-card-inner">
        <img src="./kurosaki/kurosaki_film-02.webp" class="preset-thumb-sq" alt="icon" />
        <div class="preset-info">
          <div class="preset-filename">kurosaki.mp5</div>
          <div class="preset-details">野田結太 / 葉山 黒崎海岸 -- 10:55</div>
        </div>
      </div>
    </div>
  </div>
</div>

<div id="processing-screen">
  <div class="proc-label">Building Audio Map</div>
  <div class="loader-bar"><div class="loader-inner"></div></div>
</div>

<div id="main">
  <nav id="side-nav">
    <div class="nav-logo" onclick="goTo(1)">.MP5</div>
    <div class="nav-sections-list" id="nav-sections"></div>
    <a id="nav-link-btn" class="nav-link-btn" href="" target="_blank" rel="noopener noreferrer">
      <img id="nav-link-img" src="" style="width:100%;height:100%;object-fit:cover;display:block;" />
    </a>
    <div class="nav-thumb" onclick="goTo('gallery')">
      <img id="nav-thumb-img" src="" alt="" />
    </div>
  </nav>
  <div id="content">
    <div id="project-meta-area" class="project-meta-block"></div>
    <div class="transcript-container" id="transcript-container"></div>
  </div>
</div>

<div id="gallery-screen">
  <div id="gallery-imgs" style="padding:0;display:flex;flex-direction:column;gap:0;"></div>
  <button onclick="goTo('main')" style="position:fixed;bottom:calc(var(--player-height) + 16px);left:16px;background:#fff;border:1px solid #000;font-size:10px;padding:8px 16px;font-weight:600;cursor:pointer;z-index:160;letter-spacing:0.1em;">← BACK</button>
</div>

<div id="player-bar">
  <div class="player-inner">
    <button class="play-btn" onclick="togglePlay()">
      <svg id="icon-play"  width="18" height="18" viewBox="0 0 24 24" fill="#000"><path d="M8 5v14l11-7z"/></svg>
      <svg id="icon-pause" width="18" height="18" viewBox="0 0 24 24" fill="#000" style="display:none"><path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z"/></svg>
    </button>
    <div class="timecode" id="timecode">00:00 / 00:00</div>
    <div class="mini-area" onclick="goTo('main')" style="cursor:pointer;">
      <div class="mini-speaker" id="mini-speaker"></div>
      <div class="mini-text" id="mini-text"></div>
    </div>
  </div>
</div>

<div id="lightbox" onclick="closeLightbox()">
  <img id="lightbox-img" src="" />
</div>

<script src="./noda_data.js"></script>

<script src="./kikuchi_data.js"></script>

<script>
const NODA_IMAGES = ['./nodayuta.jpg','./nodayuta_2.jpg','./nodayuta_3.jpg','./nodayuta_4.jpg'];
const NODA_THUMB  = './nodayuta.jpg';
const NODA_LINK   = 'https://www.instagram.com/yutand___';

const KUROSAKI_IMAGES = [
  './kurosaki/kurosaki_film-01.webp','./kurosaki/kurosaki_film-02.webp','./kurosaki/kurosaki_film-03.webp',
  './kurosaki/kurosaki_film-04.webp','./kurosaki/kurosaki_film-05.webp','./kurosaki/kurosaki_film-06.webp','./kurosaki/kurosaki_film-07.webp'
];
const KUROSAKI_THUMB = './kurosaki/kurosaki_film-03.webp';
const KUROSAKI_META = {
  title: "野田結太.mp5", loc: "loc. 葉山 黒崎海岸", date: "2026.12.16",
  desc: "今回の葉山市、黒崎海岸での.mp5では、レコーダーを持ち音の収集を行った。<br>日没ごろ、野田の制作音源を海に正対し演奏。<br>録音音源は撮影後、「Kurosaki ambient」 として発展。",
  credits: "sound: @yutand___<br>Photography: @la_viscuit<br>Production: @___.mp5"
};

const KIKUCHI_IMAGES = ['./yukikikuchi.jpg','./yukikikuchi_2.jpg'];
const KIKUCHI_THUMB  = './yukikikuchi.jpg';
const KIKUCHI_LINK   = 'https://www.instagram.com/memo.riesreview';

const audio = new Audio();
let playing = false, transcript = [], sections = [], lastEl = null;
let userScrolling = false, uScrollTimer = null;

function goTo(n) {
  ['screen-0','screen-1','screen-2','processing-screen','main','gallery-screen'].forEach(id => {
    const el = document.getElementById(id); if (el) el.style.display = 'none';
  });
  if (n===0) document.getElementById('screen-0').style.display='flex';
  if (n===1) document.getElementById('screen-1').style.display='flex';
  if (n===2) document.getElementById('screen-2').style.display='flex';
  if (n==='proc') document.getElementById('processing-screen').style.display='flex';
  if (n==='main') document.getElementById('main').style.display='flex';
  if (n==='gallery') document.getElementById('gallery-screen').style.display='flex';
  if (audio.src && audio.src !== "") document.getElementById('player-bar').style.display = 'flex';
  else document.getElementById('player-bar').style.display = 'none';
}

document.getElementById('entry-permission-btn').addEventListener('click', async () => {
  if (typeof DeviceOrientationEvent !== 'undefined' && typeof DeviceOrientationEvent.requestPermission === 'function') {
    try { const state = await DeviceOrientationEvent.requestPermission(); if (state === 'granted') { window.addEventListener('deviceorientation', handleGyro, true); } } catch (e) {}
  } else { window.addEventListener('deviceorientation', handleGyro, true); }
  goTo(1);
});

function handleGyro(event) {
  const xAdj = (event.gamma || 0);
  const yAdj = (event.beta || 0) - 34;

  // トップページのロゴ
  const logo = document.getElementById('gyro-logo');
  const s1 = document.getElementById('screen-1');
  if (s1 && s1.style.display !== 'none' && logo) {
    const moveX = Math.max(-60, Math.min(60, xAdj / 1.1));
    const moveY = Math.max(-60, Math.min(60, yAdj / 1.1));
    logo.style.transform = `translate3d(${moveX}px, ${moveY}px, 0) rotateX(${-moveY * 3.5}deg) rotateY(${moveX * 3.5}deg)`;
  }

  // ライトボックスのジャイロ（viewfinder）
  const lb = document.getElementById('lightbox');
  const lbImg = document.getElementById('lightbox-img');
  if (lb && lb.style.display === 'flex' && lbImg) {
    const panX = Math.max(-25, Math.min(25, xAdj * 0.7));
    const panY = Math.max(-20, Math.min(20, yAdj * 0.5));
    const rawBeta = (event.beta || 45);
    const zoomT = Math.max(0, Math.min(1, (rawBeta - 20) / 50));
    const scale = 1.5 - (zoomT * 0.5);
    lbImg.style.transform = `translate(${panX}px, ${panY}px) scale(${scale})`;
  }
}

function startExperience(file) {
  audio.pause(); audio.src = ''; audio.play().then(()=>audio.pause()).catch(()=>{}); 
  const metaArea = document.getElementById('project-meta-area');
  if (file==='kurosaki') {
    setImages(KUROSAKI_IMAGES, KUROSAKI_THUMB, NODA_LINK, './yutanoda_ig.jpg');
    metaArea.innerHTML = `<div class="project-meta-title">${KUROSAKI_META.title}</div><div class="project-meta-sub">${KUROSAKI_META.loc} / ${KUROSAKI_META.date}</div><div class="project-meta-desc">${KUROSAKI_META.desc}</div><div class="project-meta-credits">${KUROSAKI_META.credits}</div>`;
    transcript = []; sections = []; renderNav(); renderTranscript(); goTo('main');
    // タップした瞬間にunlock & 即再生
    audio.src = './kurosaki.mp3';
    audio.loop = false;
    audio.load();
    const playPromise = audio.play();
    if (playPromise !== undefined) {
      playPromise.then(()=>{ playing=true; updateIcons(); document.getElementById('player-bar').style.display='flex'; }).catch(()=>{});
    }
    document.getElementById('player-bar').style.display = 'flex';
  } else if (file==='noda') {
    audio.src = './nodayuta.mp3'; transcript = NODA_TRANSCRIPT.slice(); sections = NODA_SECTIONS.slice();
    setImages(NODA_IMAGES, NODA_THUMB, NODA_LINK, './yutanoda_ig.jpg'); metaArea.innerHTML = ''; loadAndStart();
  } else if (file==='kikuchi') {
    audio.src = './kikuchiyuki_compressed.mp3'; transcript = KIKUCHI_TRANSCRIPT.slice(); sections = KIKUCHI_SECTIONS.slice();
    setImages(KIKUCHI_IMAGES, KIKUCHI_THUMB, KIKUCHI_LINK, './yukikikuchi_2.jpg'); metaArea.innerHTML = ''; loadAndStart();
  }
}

function loadAndStart() {
  audio.load(); goTo('proc');
  setTimeout(() => { renderNav(); renderTranscript(); goTo('main'); audio.play().then(()=>playing=true).catch(e=>{}); }, 3000);
}

function setImages(imgs, thumb, link, linkImg) {
  document.getElementById('nav-thumb-img').src = thumb;
  const btn = document.getElementById('nav-link-btn'), img = document.getElementById('nav-link-img');
  btn.href = link; if (linkImg) { img.src = linkImg; btn.style.display = 'flex'; } else { btn.style.display = 'none'; }
  document.getElementById('gallery-imgs').innerHTML = imgs.map(src => `<img src="${src}" onclick="openLightbox('${src}')" style="width:100%;height:auto;display:block;cursor:pointer;" />`).join('');
}

function renderNav() {
  document.getElementById('nav-sections').innerHTML = sections.map((s,i)=>`<button class="section-item" id="nsec-${i}" onclick="jumpTo(${s.start})"><span class="section-num">0${i+1}</span>${s.title}</button>`).join('');
}

function renderTranscript() {
  document.getElementById('transcript-container').innerHTML = transcript.map((t,i)=>`<div class="transcript-entry" id="te-${i}" data-start="${t.start}" data-end="${t.end||t.start+30}"><div class="entry-meta"><span class="speaker-name">${t.speaker}</span><span class="time-stamp">${t.startText||''}</span></div><div>${t.text}</div></div>`).join('');
}

function jumpTo(sec) { audio.currentTime = sec; audio.play().then(()=>{ playing=true; updateIcons(); }); }
function togglePlay() { if (playing) audio.pause(); else audio.play().then(()=>playing=true); }
function updateIcons() {
  document.getElementById('icon-play').style.display = playing?'none':'block';
  document.getElementById('icon-pause').style.display = playing?'block':'none';
}

audio.ontimeupdate = () => {
  const cur=audio.currentTime, dur=audio.duration||0;
  const fmt=s=>`${String(Math.floor(s/60)).padStart(2,'0')}:${String(Math.floor(s%60)).padStart(2,'0')}`;
  document.getElementById('timecode').innerText=`${fmt(cur)} / ${fmt(dur)}`;
  let activeEl=null;
  transcript.forEach((t,i)=>{
    const el=document.getElementById(`te-${i}`); const on=cur>=t.start && cur<=(t.end||t.start+30); 
    if (el) el.classList.toggle('active',on);
    if (on) { activeEl=el; document.getElementById('mini-speaker').innerText=t.speaker; document.getElementById('mini-text').innerText=t.text; }
  });
  if (activeEl && activeEl!==lastEl && !userScrolling) { lastEl=activeEl; const c=document.getElementById('content'); if (c) smoothScroll(c, activeEl.offsetTop - c.clientHeight/2 + activeEl.clientHeight/2, 1200); }
  sections.forEach((s,i)=>{ const el=document.getElementById(`nsec-${i}`); if(el) el.classList.toggle('active', cur>=s.start && (sections[i+1]?cur<sections[i+1].start:true)); });
};

audio.onplay = ()=>{ playing=true; updateIcons(); };
audio.onpause = ()=>{ playing=false; updateIcons(); };

function smoothScroll(el, to, dur) {
  const from=el.scrollTop, diff=to-from; let t0=null;
  const step=now=>{ if(!t0)t0=now; const p=Math.min((now-t0)/dur,1),e=1-Math.pow(1-p,3); el.scrollTop=from+diff*e; if(p<1&&!userScrolling)requestAnimationFrame(step); };
  requestAnimationFrame(step);
}

document.getElementById('content').addEventListener('touchstart',()=>{ userScrolling=true; clearTimeout(uScrollTimer); uScrollTimer=setTimeout(()=>{ userScrolling=false; },3000); },{passive:true});
function openLightbox(src) { document.getElementById('lightbox-img').src=src; document.getElementById('lightbox').style.display='flex'; }
function closeLightbox() { document.getElementById('lightbox').style.display='none'; document.getElementById('lightbox-img').style.transform='none'; }
goTo(0);
</script>

</body>
</html>
